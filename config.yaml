# Net Command Comparator — portable configuration
# Change server.public_url so LAN users know where to connect.

server:
  host: 0.0.0.0
  port: 8503
  public_url: http://localhost:8503

platforms:
  cisco:
    vendor: cisco
    product: Cisco Catalyst 9300 Series
    os: Cisco IOS XE 26.x.x
    notes: >
      Campus/access switching. StackWise-480, UADP ASIC. CLI uses configure terminal,
      interface GigabitEthernet/Te/Tw/Fo, vlan config, policy-map for QoS.
  arista:
    vendor: arista
    product: Arista CCS-720XP
    os: Arista EOS 4.36.1F
    notes: >
      Campus PoE switch. EOS uses enable/configure, interface Ethernet.
      STP mapping: Cisco "spanning-tree portfast bpduguard default" maps to
      Arista "spanning-tree edge-port bpduguard default" (global) plus
      "spanning-tree portfast" on edge/access ports as needed.

command_mappings:
  # Curated mappings override LLM when the query matches exactly (edit as needed).
  - id: no-ip-redirects
    cisco: no ip redirects
    arista: no ip unreachables
    bidirectional: true
    notes: >
      Campus L3 interface hardening. Cisco suppresses ICMP redirect messages;
      Arista equivalent is no ip unreachables on the interface.
    differences:
      - "Cisco: no ip redirects (interface). Arista: no ip unreachables (interface)."
    reject_targets:
      - no ip icmp redirect
    caveats:
      - "Curated mapping — EOS 4.36.1F manual also documents no ip icmp redirect for redirect control."

ollama:
  base_url: http://localhost:11434
  chat_model: qwen2.5:7b
  embed_model: nomic-embed-text
  num_thread: 24
  chat_timeout: 180

search:
  top_k: 12
  min_similarity: 0.30

index:
  db_path: data/net_comd_comp.db
  data_dir: data

sources:
  cisco:
    pdfs: []
    urls:
      # Ingest the PDF first — HTML chapters alone miss many commands (e.g. "no ip redirects").
      - name: Catalyst 9300 IOS XE 26.x Command Reference (PDF)
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr.pdf
        type: pdf
      - name: Catalyst 9300 IOS XE 26.x Command Reference (index)
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr.html
      - name: IOS XE 26.x — Using the CLI
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/using_the_command_line_interface.html
      - name: IOS XE 26.x — Interface and Hardware Commands
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/interface_and_hardware_commands.html
      - name: IOS XE 26.x — Layer 2/3 Commands
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/layer_2_3_commands.html
      - name: IOS XE 26.x — VLAN Commands
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/vlan_commands.html
      - name: IOS XE 26.x — Security Commands
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/security_commands.html
      - name: IOS XE 26.x — QoS Commands
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/qos_commands.html
      - name: IOS XE 26.x — IP Routing Commands
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/unicast_routing_commands.html
      - name: IOS XE 26.x — IP Addressing Services
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/ip_addressing_services_commands.html
      - name: IOS XE 26.x — Stack Manager and HA
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/stack_manager_and_high_availability_commands.html
      - name: IOS XE 26.x — System Management
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/system_management_commands.html
      - name: IOS XE 26.x — Network Management
        url: https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/26-x/command_reference/b_26x_9300_cr/network_management_commands.html
      - name: IOS XE 26.x — Programmability Commands
        url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/prog/command/26x/26x-prog-commands.html
  arista:
    pdfs: []
    urls:
      # Arista um-eos HTML pages require JavaScript and ingest as empty shells.
      # Use the official EOS User Manual PDF (matches EOS 4.36.1F on arista.com/en/um-eos).
      - name: EOS 4.36.1F User Manual (full PDF)
        url: https://www.arista.com/assets/data/pdf/user-manual/EOS-User-Manual.pdf
        type: pdf

ui:
  page_title: Net Command Comparator
  default_direction: auto